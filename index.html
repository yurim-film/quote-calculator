<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>YOUR FILM</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0d0d0f;
  color:white;
}

/* 첫 화면 */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:linear-gradient(to bottom, rgba(0,0,0,0.6), #0d0d0f);
}

.hero h1{
  font-size:36px;
  letter-spacing:2px;
}

.hero p{
  color:#aaa;
  margin-top:10px;
  font-size:14px;
  line-height:1.5;
}

/* 버튼 */
.btn{
  display:block;
  margin-top:15px;
  padding:16px;
  border-radius:30px;
  text-align:center;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

.btn-main{
  background:#7b61ff;
  color:white;
}

.btn-kakao{
  background:#fee500;
  color:#000;
}

.btn-insta{
  background:#1a1a1d;
  color:white;
  border:1px solid #333;
}

.btn:hover{
  transform:scale(1.05);
}

/* 섹션 */
.section{
  max-width:420px;
  margin:80px auto;
  padding:0 20px;
}

.section h2{
  margin-bottom:10px;
}

.section p{
  color:#aaa;
  line-height:1.6;
}

/* 카드 */
.card{
  background:#1a1a1d;
  padding:20px;
  border-radius:12px;
  margin-top:15px;
}

/* 하단 */
.footer{
  text-align:center;
  font-size:12px;
  color:#666;
  margin:60px 0;
}
</style>
</head>

<body>

<!-- 🔥 첫 화면 -->
<div class="hero">
  <h1>YOUR FILM</h1>

  <p>
    춤을 가장 멋있게 남기는 방법<br>
    퍼포먼스 촬영 전문
  </p>

  <a href="quote.html" class="btn btn-main">
    견적 계산하기
  </a>

  <a href="https://open.kakao.com/o/너링크" class="btn btn-kakao">
    카톡 문의하기
  </a>

  <a href="https://instagram.com/너아이디" class="btn btn-insta">
    인스타그램
  </a>
</div>

<!-- 🔥 소개 -->
<div class="section">
  <h2>About</h2>
  <p>
    YOUR FILM은 댄스, 퍼포먼스 촬영을 전문으로 합니다.<br>
    단순 기록이 아닌, 감각적인 영상으로 완성합니다.
  </p>

  <div class="card">
    ✔ 댄스 촬영 전문<br>
    ✔ 감각적인 연출<br>
    ✔ 빠른 작업 가능
  </div>
</div>

<!-- 🔥 마지막 CTA -->
<div class="section">
  <h2>Start</h2>
  <p>
    간단한 정보 입력으로<br>
    바로 견적을 확인하세요.
  </p>

  <a href="quote.html" class="btn btn-main">
    지금 견적 확인하기
  </a>
</div>

<div class="footer">
  © YOUR FILM
</div>

</body>
</html>
