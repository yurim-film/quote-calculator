<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YOUR FILM</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:'Noto Sans KR',sans-serif;
  background:#050507;
  color:white;
  overflow-x:hidden;
}

/* ---------------- LOADER ---------------- */

#loader{
  position:fixed;
  inset:0;
  background:#050507;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition:.7s;
}

#loader.hide{
  opacity:0;
  pointer-events:none;
}

.loader-text{
  font-family:'Bebas Neue';
  font-size:48px;
  letter-spacing:10px;
  opacity:0;
  animation:fade 1.2s forwards;
}

@keyframes fade{
  to{
    opacity:1;
  }
}

/* ---------------- HERO ---------------- */

.hero{
  position:relative;
  height:100svh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:0 20px;
}

.bg-video{
  position:absolute;
  top:50%;
  left:50%;
  width:100vw;
  height:100svh;
  transform:translate(-50%,-50%);
  object-fit:cover;

  opacity:.72;
  filter:brightness(1.05);

  z-index:-2;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    rgba(0,0,0,.15),
    rgba(0,0,0,.68)
  );
  z-index:-1;
}

.logo{
  font-family:'Bebas Neue';
  font-size:42px;
  letter-spacing:6px;
}

.hero-title{
  margin-top:14px;
  font-size:20px;
  line-height:1.25;
  font-weight:700;
  letter-spacing:-0.5px;
}

.hero-sub{
  margin-top:14px;
  font-size:13px;
  color:#bcbcbc;
  line-height:1.7;
}

/* scroll */

.scroll-down{
  position:absolute;
  bottom:35px;
  left:50%;
  transform:translateX(-50%);
  font-size:11px;
  letter-spacing:3px;
  color:#cfcfcf;
  opacity:.8;
  animation:updown 1.6s infinite;
}

@keyframes updown{
  0%{
    transform:translate(-50%,0);
  }
  50%{
    transform:translate(-50%,6px);
  }
  100%{
    transform:translate(-50%,0);
  }
}

/* ---------------- SECTION ---------------- */

.section{
  margin:70px auto;
}

.section-title{
  padding:0 20px;
  font-family:'Bebas Neue';
  font-size:34px;
  letter-spacing:4px;
  margin-bottom:25px;
}

/* ---------------- PORTFOLIO ---------------- */

.swipe-text{
  font-size:11px;
  letter-spacing:2px;
  color:#777;
  margin-bottom:14px;
  padding-left:20px;
}

.video-slider{
  display:flex;
  gap:14px;

  overflow-x:auto;
  scroll-snap-type:x mandatory;

  padding:0 20px 10px;

  -webkit-overflow-scrolling:touch;
}

.video-slider::-webkit-scrollbar{
  display:none;
}

.video-card{
  min-width:54%;

  background:#0d0d12;

  border-radius:22px;
  overflow:hidden;

  border:1px solid #1d1d22;

  scroll-snap-align:start;

  flex-shrink:0;
}

.video-card video{
  width:100%;
  height:400px;

  object-fit:cover;
  display:block;

  background:black;
}

.video-info{
  padding:14px;
}

.video-title{
  font-size:14px;
  font-weight:700;
  letter-spacing:-0.3px;
}

.video-sub{
  margin-top:5px;

  font-size:12px;
  color:#7d7d85;

  line-height:1.4;
}

/* ---------------- INSTAGRAM ---------------- */

.insta-card{
  margin:30px 20px 0;

  background:#0d0d12;
  border:1px solid #1d1d22;

  border-radius:28px;

  padding:34px 20px;

  text-align:center;
}

.insta-label{
  font-family:'Bebas Neue';
  font-size:32px;
  letter-spacing:4px;
}

.insta-id{
  margin-top:10px;
  color:#8f8f95;
  font-size:14px;
}

.insta-btn{
  width:100%;
  height:56px;

  border-radius:999px;

  margin-top:24px;

  display:flex;
  align-items:center;
  justify-content:center;

  text-decoration:none;

  background:white;
  color:black;

  font-weight:700;
  font-size:15px;
}

/* ---------------- CTA ---------------- */

.cta{
  margin-top:80px;
  padding:0 20px;
  text-align:center;
}

.cta-title{
  font-size:24px;
  line-height:1.45;
  font-weight:700;
  letter-spacing:-1px;
}

.cta-buttons{
  margin-top:30px;
}

.cta-btn{
  width:100%;
  height:58px;

  border-radius:999px;

  display:flex;
  justify-content:center;
  align-items:center;

  text-decoration:none;

  font-weight:700;
  font-size:15px;

  transition:.2s;
}

.cta-btn-main{
  background:white;
  color:black;
}

.cta-btn-sub{
  margin-top:12px;

  background:#111114;
  border:1px solid #24242a;

  color:#d0d0d0;
}

.cta-btn:active{
  transform:scale(.97);
}

/* ---------------- FLOATING ---------------- */

.floating-kakao{
  position:fixed;
  right:18px;
  bottom:18px;

  width:62px;
  height:62px;

  border-radius:50%;
  background:#fee500;

  display:flex;
  align-items:center;
  justify-content:center;

  text-decoration:none;

  color:black;
  font-size:12px;
  font-weight:800;

  opacity:0;
  transform:translateY(20px);

  transition:.3s;

  z-index:999;
}

.floating-kakao.show{
  opacity:1;
  transform:translateY(0);
}

/* ---------------- FOOTER ---------------- */

.footer{
  margin:90px 0 35px;
  text-align:center;
  font-size:11px;
  color:#555;
}

</style>
</head>

<body>

<!-- LOADER -->

<div id="loader">
  <div class="loader-text">
    YOUR FILM
  </div>
</div>

<!-- HERO -->

<section class="hero">

  <video autoplay muted loop playsinline class="bg-video">
    <source src="video.mp4" type="video/mp4">
  </video>

  <div class="logo">
    YOUR FILM
  </div>

  <div class="hero-title">
    YOUR MOVEMENT,<br>
    YOUR FILM
  </div>

  <div class="hero-sub">
    Dance Film · Performance Video · Reel Content
  </div>

  <div class="scroll-down">
    VIEW WORKS ↓
  </div>

</section>

<!-- PORTFOLIO -->

<section class="section" id="portfolio">

  <div class="section-title">
    PORTFOLIO
  </div>

  <p class="swipe-text">
    SWIPE →
  </p>

  <div class="video-slider">

    <!-- PERFORMANCE -->

    <div class="video-card">

      <video autoplay muted loop playsinline>
        <source src="perfor_video1.mp4" type="video/mp4">
      </video>

      <div class="video-info">

        <div class="video-title">
          PERFORMANCE VIDEO
        </div>

        <div class="video-sub">
          Cinematic Performance
        </div>

      </div>

    </div>

    <!-- KPOP -->

    <div class="video-card">

      <video autoplay muted loop playsinline>
        <source src="kpop_video1.mp4" type="video/mp4">
      </video>

      <div class="video-info">

        <div class="video-title">
          KPOP COVER
        </div>

        <div class="video-sub">
          Cover Dance Film
        </div>

      </div>

    </div>

    <!-- DANCE FILM -->

    <div class="video-card">

      <video autoplay muted loop playsinline>
        <source src="film_video1.mp4" type="video/mp4">
      </video>

      <div class="video-info">

        <div class="video-title">
          DANCE FILM
        </div>

        <div class="video-sub">
          Mood Visual
        </div>

      </div>

    </div>

  </div>

  <!-- INSTAGRAM -->

  <div class="insta-card">

    <div class="insta-label">
      INSTAGRAM
    </div>

    <div class="insta-id">
      @your___film
    </div>

    <a href="https://instagram.com/your___film"
       target="_blank"
       class="insta-btn">

      작업 더 보기

    </a>

  </div>

</section>

<!-- CTA -->

<section class="cta">

  <div class="cta-title">
    가나다라<br>
    마바사
  </div>

  <div class="cta-buttons">

    <a href="quote.html"
       class="cta-btn cta-btn-main">

      견적 계산하기

    </a>

    <a href="https://instagram.com/your___film"
       target="_blank"
       class="cta-btn cta-btn-sub">

      포트폴리오 더 보기

    </a>

  </div>

</section>

<!-- FLOATING -->

<a href="https://open.kakao.com/o/너링크"
   class="floating-kakao">

  문의

</a>

<!-- FOOTER -->

<div class="footer">
  © YOUR FILM
</div>

<script>

/* 로딩 */

window.addEventListener("load",()=>{

  setTimeout(()=>{

    document.getElementById("loader")
      .classList.add("hide");

  },1200);

});

/* 플로팅 버튼 */

window.addEventListener("scroll",()=>{

  const btn =
    document.querySelector(".floating-kakao");

  if(window.scrollY > 200){
    btn.classList.add("show");
  }else{
    btn.classList.remove("show");
  }

});

</script>

</body>
</html>
