<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>YOUR FILM</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0d0d0f;
  color:white;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  gap:8px;
}

.hero h1{
  font-size:36px;
}

.hero p{
  color:#aaa;
  margin-top:10px;
}

/* 버튼 */
.btn{
  display:flex;
  justify-content:center;
  align-items:center;

  height:56px;
  width:100%;
  max-width:260px;
  padding:0 20px;

  border-radius:30px;
  text-decoration:none;
  font-weight:bold;

  transition:all 0.15s ease;
  box-shadow:0 6px 15px rgba(0,0,0,0.3);
}

.btn-main{
  background:#7b61ff;
  color:white;
}

.btn-kakao{
  background:#fee500;
  color:#000;
}

.btn-insta{
  background: linear-gradient(
    45deg,
    #feda75,
    #fa7e1e,
    #d62976,
    #962fbf,
    #4f5bd5
  );
  color:white;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

.btn:active{
  transform:scale(0.95);
  box-shadow:0 3px 8px rgba(0,0,0,0.3);
}

/* SECTION */
.section{
  max-width:420px;
  margin:80px auto;
  padding:0 20px;
}

.card{
  background:#1a1a1d;
  padding:20px;
  border-radius:12px;
  margin-top:15px;
}

/* 인스타 카드 */
.insta-card{
  margin-top:20px;
  padding:25px;
  border-radius:20px;
  background: linear-gradient(
    135deg,
    #feda75,
    #fa7e1e,
    #d62976,
    #962fbf,
    #4f5bd5
  );
}

.insta-text{
  background:rgba(0,0,0,0.6);
  padding:20px;
  border-radius:15px;
}

.insta-btn{
  display:inline-block;
  margin-top:15px;
  padding:12px 18px;
  border-radius:20px;
  background:white;
  color:black;
  font-weight:bold;
  text-decoration:none;
}

/* 플로팅 카톡 */
.floating-kakao{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:14px 18px;
  background:#fee500;
  color:#000;
  border-radius:30px;
  font-weight:bold;
  text-decoration:none;

  opacity:0;
  transform:translateY(20px);
  transition:0.3s;
}

.floating-kakao.show{
  opacity:1;
  transform:translateY(0);
}

/* TOP 버튼 */
.top-btn{
  position:fixed;
  bottom:90px;
  right:20px;
  width:50px;
  height:50px;
  border:none;
  border-radius:50%;
  background:#2a2a2e;
  color:white;
  cursor:pointer;

  opacity:0;
  transform:translateY(20px);
  transition:0.3s;
}

.top-btn.show{
  opacity:1;
  transform:translateY(0);
}

.footer{
  text-align:center;
  margin:60px 0;
  font-size:12px;
  color:#666;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>YOUR FILM</h1>
  <p>춤을 가장 멋있게 남기는 방법</p>

  <a href="quote.html" class="btn btn-main">견적 계산하기</a>
  <a href="https://open.kakao.com/o/너링크" class="btn btn-kakao">카톡 문의</a>
  <a href="https://instagram.com/너아이디" class="btn btn-insta">포트폴리오 보기</a>
</div>

<!-- ABOUT -->
<div class="section">
  <h2>WHY YOUR FILM</h2>

  <div class="card">🎬 댄스 촬영 특화</div>
  <div class="card">⚡ 빠른 작업</div>
  <div class="card">🔥 퍼포먼스 중심</div>
</div>

<!-- PORTFOLIO -->
<div class="section">
  <h2>PORTFOLIO</h2>

  <div class="insta-card">
    <div class="insta-text">
      <h3>YOUR FILM</h3>
      <p>실제 작업은 인스타그램에서 확인 가능합니다</p>

      <a href="https://instagram.com/너아이디" target="_blank" class="insta-btn">
        작업 보러가기 →
      </a>
    </div>
  </div>
</div>

<!-- CTA -->
<div class="section">
  <a href="quote.html" class="btn btn-main">지금 견적 확인하기</a>
</div>

<div class="footer">© YOUR FILM</div>

<!-- 플로팅 -->
<a href="https://open.kakao.com/o/너링크" class="floating-kakao">카톡 문의</a>
<button onclick="scrollToTop()" class="top-btn">↑</button>

<script>
window.addEventListener("scroll", function(){
  const kakao = document.querySelector(".floating-kakao");
  const topBtn = document.querySelector(".top-btn");

  if(window.scrollY > 200){
    kakao.classList.add("show");
    topBtn.classList.add("show");
  } else {
    kakao.classList.remove("show");
    topBtn.classList.remove("show");
  }
});

function scrollToTop(){
  window.scrollTo({
    top:0,
    behavior:"smooth"
  });
}
</script>

</body>
</html>
