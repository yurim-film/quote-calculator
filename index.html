<!DOCTYPE html>
<html lang="ko">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<head>
<meta charset="UTF-8">
<title>YOUR FILM</title>

<style>
body{
  margin:0;
  font-family:'Noto Sans KR', sans-serif;
  background:#050507;
  color:white;
  overflow-x:hidden;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
}

/* 타이틀 애니메이션 */
.hero h1{
  font-size:52px;
  font-weight:900;
  font-family:'Oswald', sans-serif;
  letter-spacing:4px;

  opacity:0;
  transform:translateY(30px);
  animation:titleFadeUp 1s ease forwards;
}

.hero p{
  margin-top:10px;
  color:#aaa;
  font-size:14px;

  opacity:0;
  transform:translateY(20px);
  animation:titleFadeUp 1s ease forwards;
  animation-delay:0.3s;
}

/* 네온 펄스 */
.neon{
  color:#7b61ff;
  text-shadow:
    0 0 5px #7b61ff,
    0 0 10px #7b61ff,
    0 0 20px #7b61ff;
  animation:neonPulse 2s infinite;
}

@keyframes neonPulse{
  0%{
    text-shadow:0 0 5px #7b61ff, 0 0 10px #7b61ff;
  }
  50%{
    text-shadow:0 0 20px #7b61ff, 0 0 40px #7b61ff;
  }
  100%{
    text-shadow:0 0 5px #7b61ff, 0 0 10px #7b61ff;
  }
}

@keyframes titleFadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* 버튼 */
.btn{
  display:flex;
  justify-content:center;
  align-items:center;

  height:56px;
  width:100%;
  max-width:260px;
  padding:0 20px;

  margin-top:15px;

  border-radius:30px;
  text-decoration:none;
  font-weight:bold;

  transition:0.2s;
}

.btn-main{
  background:#7b61ff;
  color:white;
  box-shadow:0 0 20px rgba(123,97,255,0.6);
}

.btn-kakao{
  background:#fee500;
  color:#000;
}

.btn-insta{
  border:1px solid #333;
  color:#ccc;
}

.btn:hover{
  transform:translateY(-3px);
}

.btn:active{
  transform:scale(0.94);
}

/* SECTION (스크롤 애니메이션) */
.section{
  max-width:420px;
  margin:100px auto;
  padding:0 20px;

  opacity:0;
  transform:translateY(40px);
  transition:all 0.8s ease;
}

.section.show{
  opacity:1;
  transform:translateY(0);
}

/* 카드 */
.card{
  border:1px solid #222;
  padding:20px;
  margin-top:15px;
  border-radius:10px;
  background:#0d0d12;
}

/* 포트폴리오 */
.insta-card{
  margin-top:20px;
  padding:25px;
  border-radius:20px;

  border:1px solid #7b61ff;
  box-shadow:0 0 30px rgba(123,97,255,0.3);
}

.insta-btn{
  display:inline-block;
  margin-top:15px;
  padding:12px 18px;
  border-radius:20px;

  background:#7b61ff;
  color:white;
  text-decoration:none;

  box-shadow:0 0 15px rgba(123,97,255,0.6);
}

/* 플로팅 카톡 */
.floating-kakao{
  position:fixed;
  bottom:20px;
  right:20px;

  padding:14px 18px;
  border-radius:30px;

  background:#fee500;
  color:#000;

  font-weight:bold;
  text-decoration:none;

  opacity:0;
  transform:translateY(20px);
  transition:0.3s;
}

.floating-kakao.show{
  opacity:1;
  transform:translateY(0);
}

/* TOP 버튼 */
.top-btn{
  position:fixed;
  bottom:90px;
  right:20px;

  width:50px;
  height:50px;

  border:none;
  border-radius:50%;

  background:#111;
  color:white;

  opacity:0;
  transform:translateY(20px);
  transition:0.3s;
}

.top-btn.show{
  opacity:1;
  transform:translateY(0);
}

/* 영상 */
.bg-video{
  position:absolute;
  top:50%;
  left:50%;
  width:100vw;
  height:100vh;
  transform:translate(-50%, -50%);
  object-fit:cover;
  z-index:-2;
  opacity:0.4;
}

/* 영상 어둡게 */
.hero::after{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

.footer{
  text-align:center;
  margin:80px 0;
  font-size:12px;
  color:#555;
}
</style>
</head>

<body>

<div class="hero">
  <video autoplay muted loop playsinline class="bg-video">
    <source src="video.mp4" type="video/mp4">
  </video>

  <h1 class="neon">YOUR FILM</h1>
  <p>MOVE. SHOOT. CREATE.</p>

  <a href="quote.html" class="btn btn-main">견적 계산하기</a>
  <a href="https://open.kakao.com/o/너링크" class="btn btn-kakao">카톡 문의</a>
  <a href="https://instagram.com/너아이디" class="btn btn-insta">포트폴리오 보기</a>
</div>

<div class="section">
  <h2 class="neon">WHY YOUR FILM</h2>
  <div class="card">댄스 퍼포먼스 전문 촬영</div>
  <div class="card">빠른 작업 & 감각적인 연출</div>
  <div class="card">움직임을 가장 멋있게 기록</div>
</div>

<div class="section">
  <h2 class="neon">PORTFOLIO</h2>
  <div class="insta-card">
    <p>작업은 인스타그램에서 확인하세요</p>
    <a href="https://instagram.com/너아이디" target="_blank" class="insta-btn">
      작업 보러가기 →
    </a>
  </div>
</div>

<div class="section">
  <a href="quote.html" class="btn btn-main">지금 견적 확인하기</a>
</div>

<div class="footer">© YOUR FILM</div>

<a href="https://open.kakao.com/o/너링크" class="floating-kakao">카톡</a>
<button onclick="scrollToTop()" class="top-btn">↑</button>

<script>
window.addEventListener("scroll", function(){
  const kakao = document.querySelector(".floating-kakao");
  const topBtn = document.querySelector(".top-btn");
  const sections = document.querySelectorAll(".section");

  if(window.scrollY > 200){
    kakao.classList.add("show");
    topBtn.classList.add("show");
  } else {
    kakao.classList.remove("show");
    topBtn.classList.remove("show");
  }

  sections.forEach(section => {
    const top = section.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      section.classList.add("show");
    }
  });
});

function scrollToTop(){
  window.scrollTo({
    top:0,
    behavior:"smooth"
  });
}
</script>

</body>
</html>
