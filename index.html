<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>YOUR FILM</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Noto Sans KR', sans-serif;
  background:#050507;
  color:white;
  overflow-x:hidden;
}

/* 로딩 */
#loader{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:#050507;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition:0.6s;
}
.loader-text{
  font-family:'Bebas Neue';
  font-size:48px;
  letter-spacing:8px;
  opacity:0;
  animation:fadeIn 1.2s forwards;
}
#loader.hide{
  opacity:0;
  pointer-events:none;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  position:relative;
  text-align:center;
}

/* 로고 */
.logo{
  font-family:'Bebas Neue';
  font-size:70px;
  letter-spacing:10px;
}

/* 영상 */
.bg-video{
  position:absolute;
  top:50%; left:50%;
  width:100vw; height:100vh;
  transform:translate(-50%,-50%);
  object-fit:cover;
  z-index:-2;
  opacity:0.5;
}

/* 어둡게 */
.hero::after{
  content:"";
  position:absolute;
  width:100%; height:100%;
  background:linear-gradient(
    rgba(0,0,0,0.2),
    rgba(0,0,0,0.6)
  );
  z-index:-1;
}

/* 버튼 */
.btn{
  display:flex;
  justify-content:center;
  align-items:center;
  height:56px;
  width:100%;
  max-width:260px;
  margin-top:15px;
  border-radius:30px;
  text-decoration:none;
  font-weight:bold;
  transition:0.2s;
}
.btn-main{ background:white; color:black; }
.btn-kakao{ background:#fee500; color:black; }
.btn-insta{ border:1px solid #333; color:#ccc; }

.btn:hover{ transform:translateY(-3px); }
.btn:active{ transform:scale(0.94); }

/* 섹션 */
.section{
  max-width:420px;
  margin:100px auto;
  padding:0 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* 카드 */
.card{
  width:100%;
  border:1px solid #222;
  padding:20px;
  margin-top:15px;
  border-radius:10px;
  background:#0d0d12;
}

/* 🔥 영상 슬라이드 */
.video-slider{
  display:flex;
  gap:15px;
  overflow-x:auto;
  padding-bottom:10px;
  scroll-snap-type:x mandatory;
}
.video-slider::-webkit-scrollbar{ display:none; }

.video-card{
  min-width:220px;
  border-radius:12px;
  overflow:hidden;
  border:1px solid #222;
  background:#000;
  scroll-snap-align:start;
  transition:0.3s;
}
.video-card video{
  width:100%;
}
.video-card:hover{
  transform:scale(1.05);
}

/* 인스타 카드 */
.insta-card{
  width:100%;
  margin-top:20px;
  padding:25px;
  border-radius:20px;
  border:1px solid #222;
  text-align:center;
}
.insta-btn{
  display:inline-block;
  margin-top:15px;
  padding:12px 18px;
  border-radius:20px;
  background:white;
  color:black;
  text-decoration:none;
}

/* 플로팅 */
.floating-kakao{
  position:fixed;
  bottom:20px; right:20px;
  padding:14px 18px;
  border-radius:30px;
  background:#fee500;
  color:#000;
  font-weight:bold;
  opacity:0;
  transform:translateY(20px);
  transition:0.3s;
}
.floating-kakao.show{
  opacity:1;
  transform:translateY(0);
}

/* TOP 버튼 */
.top-btn{
  position:fixed;
  bottom:90px; right:20px;
  width:50px; height:50px;
  border:none;
  border-radius:50%;
  background:#111;
  color:white;
  opacity:0;
  transform:translateY(20px);
  transition:0.3s;
}
.top-btn.show{
  opacity:1;
  transform:translateY(0);
}

.footer{
  text-align:center;
  margin:80px 0;
  font-size:12px;
  color:#555;
}

@keyframes fadeIn{
  to{opacity:1;}
}
</style>
</head>

<body>

<!-- 로딩 -->
<div id="loader">
  <div class="loader-text">YOUR FILM</div>
</div>

<!-- HERO -->
<div class="hero">
  <video autoplay muted loop playsinline class="bg-video">
    <source src="video.mp4" type="video/mp4">
  </video>

  <h1 class="logo">YOUR FILM</h1>
  <p>MOVE. SHOOT. CREATE.</p>

  <a href="quote.html" class="btn btn-main">견적 계산하기</a>
  <a href="https://open.kakao.com/o/너링크" class="btn btn-kakao">카톡 문의</a>
  <a href="https://instagram.com/너아이디" class="btn btn-insta">포트폴리오 보기</a>
</div>

<!-- ABOUT -->
<div class="section">
  <h2>WHY YOUR FILM</h2>
  <div class="card">댄스 퍼포먼스 전문 촬영</div>
  <div class="card">빠른 작업 & 감각적인 연출</div>
  <div class="card">움직임을 가장 멋있게 기록</div>
</div>

<!-- PORTFOLIO -->
<div class="section">
  <h2>PORTFOLIO</h2>

  <div class="video-slider">
    <div class="video-card">
      <video autoplay muted loop playsinline>
        <source src="video.mp4" type="video/mp4">
      </video>
    </div>

    <div class="video-card">
      <video controls playsinline>
        <source src="video.mp4" type="video/mp4">
      </video>
    </div>

    <div class="video-card">
      <video controls playsinline>
        <source src="video.mp4" type="video/mp4">
      </video>
    </div>
  </div>

  <div class="insta-card">
    <p>더 많은 작업은 인스타그램에서 확인하세요</p>
    <a href="https://instagram.com/너아이디" target="_blank" class="insta-btn">
      작업 보러가기 →
    </a>
  </div>
</div>

<!-- CTA -->
<div class="section">
  <a href="quote.html" class="btn btn-main">지금 견적 확인하기</a>
</div>

<div class="footer">© YOUR FILM</div>

<!-- 플로팅 -->
<a href="https://open.kakao.com/o/너링크" class="floating-kakao">카톡</a>
<button onclick="scrollToTop()" class="top-btn">↑</button>

<script>
window.addEventListener("load", () => {
  setTimeout(()=>{
    document.getElementById("loader").classList.add("hide");
  },1200);
});

window.addEventListener("scroll", () => {
  const y = window.scrollY;
  document.querySelector(".floating-kakao").classList.toggle("show", y>200);
  document.querySelector(".top-btn").classList.toggle("show", y>200);
});

function scrollToTop(){
  window.scrollTo({top:0, behavior:"smooth"});
}
</script>

</body>
</html>
