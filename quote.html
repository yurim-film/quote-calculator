<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>촬영 견적 계산</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body {
  background:#0d0d0f;
  color:white;
  font-family:sans-serif;
  padding:20px;
}

.container {
  max-width:420px;
  margin:auto;
}

h2 {
  text-align:center;
  margin-bottom:20px;
}

.section {
  margin-top:20px;
}

input {
  width:100%;
  padding:16px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:15px;
  background:#1a1a1d;
  color:white;
}

.options {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}

button {
  padding:10px 14px;
  border:none;
  border-radius:20px;
  background:#2a2a2e;
  color:white;
  cursor:pointer;
}

button.active {
  background:#7b61ff;
}

.result-card {
  background:#1a1a1d;
  padding:20px;
  border-radius:16px;
  margin-top:30px;
}

.result-title {
  font-size:14px;
  color:#aaa;
}

.total {
  font-size:32px;
  color:#7b61ff;
  margin-top:5px;
}

#detail {
  margin-top:10px;
  font-size:13px;
  color:#aaa;
}

.save-btn {
  width:100%;
  background:#7b61ff;
  color:white;
  padding:14px;
  border:none;
  border-radius:12px;
  margin-top:15px;
  font-size:16px;
}

.kakao-btn {
  display:block;
  text-align:center;
  background:#fee500;
  color:#000;
  padding:16px;
  border-radius:12px;
  margin-top:20px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>촬영 견적 계산</h2>

<div class="section">
  <p>촬영 정보</p>

  <input type="number" id="people" placeholder="촬영 인원 (명)">
  <input type="number" id="music" placeholder="음원 총 길이 (분)">
  <input type="number" id="time" placeholder="촬영 시간 (시간)">
  <input type="number" id="edit" placeholder="수정 횟수">
</div>

<div class="section">
  <p>옵션 선택</p>
  <div class="options">
    <button onclick="toggleOption('color',80000,this)">색보정</button>
    <button onclick="toggleOption('fast',100000,this)">빠른 납기</button>
    <button onclick="toggleOption('outdoor',70000,this)">야외 촬영</button>
  </div>
</div>

<div class="result-card">
  <p class="result-title">총 견적 금액</p>
  <div class="total" id="total">₩100,000</div>
  <div id="detail"></div>
</div>

<button onclick="saveImage()" class="save-btn">
  견적 이미지 저장
</button>

<a class="kakao-btn" href="https://open.kakao.com/o/너링크" target="_blank">
  카톡으로 문의하기
</a>

</div>

<script>
let options = {};

function toggleOption(name, price, el){
  if(options[name]){
    delete options[name];
    el.classList.remove("active");
  } else {
    options[name] = price;
    el.classList.add("active");
  }
  update();
}

function update(){
  let people = parseInt(document.getElementById("people").value) || 0;
  let music = parseFloat(document.getElementById("music").value) || 0;
  let time = parseInt(document.getElementById("time").value) || 0;
  let edit = parseInt(document.getElementById("edit").value) || 0;

  let total = 0;
  let detail = [];

  // 👥 인원
  if(people > 0){
    if(people > 5){
      let cost = people * 50000;
      total += cost;
      detail.push(`촬영 인원 (${people}명 × 50,000) = ₩${cost.toLocaleString()}`);
    } else {
      let cost = people * 20000;
      total += cost;
      detail.push(`촬영 인원 (${people}명 × 20,000) = ₩${cost.toLocaleString()}`);
    }
  }

  // 🎵 음원
  if(music > 1){
    let extra = Math.ceil((music - 1) / 0.5);
    let cost = extra * 100000;
    total += cost;
    detail.push(`음원 추가 (${extra} × 100,000) = ₩${cost.toLocaleString()}`);
  }

  // ⏱️ 시간
  if(time > 0){
    let cost = time * 50000;
    total += cost;
    detail.push(`촬영 시간 (${time}시간 × 50,000) = ₩${cost.toLocaleString()}`);
  }

  // 🔁 수정
  if(edit > 1){
    let cost = (edit - 1) * 30000;
    total += cost;
    detail.push(`수정 추가 (${edit - 1}회 × 30,000) = ₩${cost.toLocaleString()}`);
  }

  // ⚙️ 옵션
  for(let key in options){
    total += options[key];
  }

  // 💰 최소 금액
  if(total < 100000){
    total = 100000;
    detail.push(`최소 금액 적용 = ₩100,000`);
  }

  // 출력
  document.getElementById("total").innerText =
    "₩" + total.toLocaleString();

  document.getElementById("detail").innerHTML =
    detail.map(d => `<p>${d}</p>`).join("");
}

// 입력 자동 반영
document.querySelectorAll("input").forEach(i=>{
  i.addEventListener("input", update);
});

// 이미지 저장
function saveImage(){
  html2canvas(document.body).then(canvas=>{
    let link = document.createElement("a");
    link.download = "quote.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}
</script>

</body>
</html>
