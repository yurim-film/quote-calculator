<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>촬영 견적 계산</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#050505;
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,"Pretendard",sans-serif;
  padding:28px 18px 140px;
}

.container{
  max-width:430px;
  margin:auto;
}

h2{
  text-align:center;
  font-size:42px;
  font-weight:800;
  margin-bottom:40px;
  letter-spacing:-1px;
}

/* ---------- 공통 ---------- */

.label{
  font-size:15px;
  margin-bottom:12px;
  color:#f5f5f5;
}

.section{
  margin-top:26px;
}

.input-row{
  display:flex;
  gap:12px;
}

.input-box{
  width:100%;
}

input,
select{
  width:100%;
  height:58px;
  border:none;
  outline:none;
  border-radius:18px;
  background:#151518;
  color:white;
  padding:0 18px;
  font-size:16px;
}

/* number 화살표 제거 */
input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button{
  -webkit-appearance:none;
  margin:0;
}

/* ---------- 날짜 ---------- */

.date-wrap{
  position:relative;
}

.date-wrap input{
  padding-right:54px;
}

.calendar-icon{
  position:absolute;
  right:18px;
  top:50%;
  transform:translateY(-50%);
  font-size:20px;
  pointer-events:none;
  opacity:.9;
}

/* 기본 검은 아이콘 제거 */
input[type="date"]::-webkit-calendar-picker-indicator{
  opacity:0;
  position:absolute;
  right:0;
  width:100%;
  height:100%;
  cursor:pointer;
}

/* ---------- 시간 select ---------- */

.time-select-wrap{
  position:relative;
}

.time-select-wrap::after{
  content:"⌄";
  position:absolute;
  right:20px;
  top:50%;
  transform:translateY(-52%);
  font-size:22px;
  color:#999;
  pointer-events:none;
}

select{
  appearance:none;
  -webkit-appearance:none;
  cursor:pointer;
}

/* ---------- 옵션 ---------- */

.option-list{
  margin-top:10px;
  border-radius:22px;
  overflow:hidden;
  background:#151518;
}

.option-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:20px 18px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.option-item:last-child{
  border-bottom:none;
}

.option-left{
  display:flex;
  align-items:center;
  gap:14px;
  font-size:16px;
}

/* 체크박스 */
.option-check{
  width:22px;
  height:22px;
  border-radius:7px;
  border:1.5px solid #444;
  background:transparent;
  transition:.2s;
}

.option-item.active .option-check{
  background:#7b61ff;
  border-color:#7b61ff;
}

/* ---------- 결과 ---------- */

.result-card{
  background:#111114;
  border-radius:24px;
  padding:24px;
  margin-top:30px;
}

.result-card h3{
  font-size:14px;
  letter-spacing:2px;
  color:#888;
  margin-bottom:18px;
}

#detail{
  line-height:1.8;
  color:#ddd;
  font-size:14px;
}

.total{
  margin-top:20px;
  font-size:36px;
  font-weight:800;
  color:#7b61ff;
}

.info{
  margin-top:18px;
  font-size:12px;
  line-height:1.7;
  color:#8c8c8c;
}

/* ---------- 버튼 ---------- */

.save-btn{
  width:100%;
  height:60px;
  border:none;
  border-radius:20px;
  margin-top:18px;
  background:#7b61ff;
  color:white;
  font-size:17px;
  font-weight:700;
}

.kakao-btn{
  position:fixed;
  left:50%;
  bottom:18px;
  transform:translateX(-50%);
  width:90%;
  max-width:420px;
  height:60px;
  border-radius:20px;
  background:#fee500;
  color:black;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  z-index:999;
}

</style>
</head>

<body>

<div class="container">

<h2>촬영 견적 계산</h2>

<!-- 이름 + 연락처 -->
<div class="input-row">

  <div class="input-box">
    <div class="label">고객 이름</div>
    <input type="text" id="client" placeholder="이름">
  </div>

  <div class="input-box">
    <div class="label">연락처</div>
    <input type="text" id="phone" placeholder="010-0000-0000">
  </div>

</div>

<!-- 날짜 -->
<div class="section">

  <div class="label">촬영 날짜</div>

  <div class="date-wrap">
    <input type="date" id="shoot_date">
    <div class="calendar-icon">📅</div>
  </div>

</div>

<!-- 시작 시간 -->
<div class="section">

  <div class="label">촬영 시작 시간</div>

  <div class="time-select-wrap">

    <select id="start_time">

      <option value="">선택해주세요</option>

      <option>00:00</option>
      <option>01:00</option>
      <option>02:00</option>
      <option>03:00</option>
      <option>04:00</option>
      <option>05:00</option>
      <option>06:00</option>
      <option>07:00</option>
      <option>08:00</option>
      <option>09:00</option>
      <option>10:00</option>
      <option>11:00</option>
      <option>12:00</option>
      <option>13:00</option>
      <option>14:00</option>
      <option>15:00</option>
      <option>16:00</option>
      <option>17:00</option>
      <option>18:00</option>
      <option>19:00</option>
      <option>20:00</option>
      <option>21:00</option>
      <option>22:00</option>
      <option>23:00</option>

    </select>

  </div>

</div>

<!-- 촬영시간 + 인원 -->
<div class="section input-row">

  <div class="input-box">
    <div class="label">촬영 진행 시간</div>
    <input type="number" id="duration" placeholder="예) 2">
  </div>

  <div class="input-box">
    <div class="label">촬영 인원</div>
    <input type="number" id="people" placeholder="예) 2">
  </div>

</div>

<!-- 추가수정 -->
<div class="section">

  <div class="label">추가 수정 횟수 (1회 3만원)</div>

  <input type="number" id="edit" placeholder="예) 1">

</div>

<!-- 옵션 -->
<div class="section">

  <div class="label">옵션 선택</div>

  <div class="option-list">

    <div class="option-item" onclick="toggleOption(this,'색보정',50000)">
      <div class="option-left">
        <div class="option-check"></div>
        <span>색보정</span>
      </div>
    </div>

    <div class="option-item" onclick="toggleOption(this,'야외촬영',50000)">
      <div class="option-left">
        <div class="option-check"></div>
        <span>야외 촬영</span>
      </div>
    </div>

    <div class="option-item" onclick="toggleOption(this,'인스타 세로영상',70000)">
      <div class="option-left">
        <div class="option-check"></div>
        <span>인스타 세로영상 🔥</span>
      </div>
    </div>

    <div class="option-item" onclick="toggleOption(this,'하이라이트 영상',100000)">
      <div class="option-left">
        <div class="option-check"></div>
        <span>하이라이트 영상 ⭐</span>
      </div>
    </div>

    <div class="option-item" onclick="toggleOption(this,'빠른납기',80000)">
      <div class="option-left">
        <div class="option-check"></div>
        <span>빠른납기</span>
      </div>
    </div>

  </div>

</div>

<!-- 결과 -->
<div class="result-card" id="capture">

  <h3>YOUR FILM</h3>

  <div id="detail"></div>

  <div class="total" id="total">₩0</div>

  <div class="info">
    ✔ 기본 편집 포함<br>
    ✔ 1회 수정 포함<br>
    ✔ 영상 1개 제공
  </div>

</div>

<button class="save-btn" onclick="saveImage()">
견적 이미지 저장
</button>

</div>

<div class="kakao-btn" onclick="goKakao()">
🔥 지금 상담하기
</div>

<script>

let options = {};

/* 옵션 */
function toggleOption(el,name,price){

  if(options[name]){
    delete options[name];
    el.classList.remove("active");
  }else{
    options[name]=price;
    el.classList.add("active");
  }

  update();
}

/* 계산 */
function update(){

  let total = 0;
  let detail = [];

  const client = document.getElementById("client").value;
  const phone = document.getElementById("phone").value;
  const date = document.getElementById("shoot_date").value;
  const start = document.getElementById("start_time").value;
  const duration = parseInt(document.getElementById("duration").value) || 0;
  const people = parseInt(document.getElementById("people").value) || 0;
  const edit = parseInt(document.getElementById("edit").value) || 0;

  /* 고객 */
  if(client || phone){
    detail.push(`<strong>${client} ${phone}</strong>`);
  }

  /* 일정 */
  if(date || start){

    let text = "";

    if(date){
      let d = new Date(date);
      text += `${d.getMonth()+1}/${d.getDate()} `;
    }

    if(start){

      if(duration){

        let hour = parseInt(start.split(":")[0]);
        let end = hour + duration;

        text += `${start} ~ ${String(end).padStart(2,"0")}:00`;

      }else{
        text += start;
      }

    }

    detail.push(`촬영 일정 : ${text}`);

  }

  /* 촬영시간 */
  if(duration){

    let cost = duration * 50000;
    total += cost;

    detail.push(`촬영 시간 (${duration}) = ₩${cost.toLocaleString()}`);

  }

  /* 인원 */
  if(people){

    let cost = people * 20000;
    total += cost;

    detail.push(`촬영 인원 (${people}) = ₩${cost.toLocaleString()}`);

  }

  /* 수정 */
  if(edit){

    let cost = edit * 30000;
    total += cost;

    detail.push(`추가 수정 (${edit}) = ₩${cost.toLocaleString()}`);

  }

  /* 옵션 */
  for(let key in options){

    total += options[key];

    detail.push(`${key} = ₩${options[key].toLocaleString()}`);

  }

  document.getElementById("detail").innerHTML =
    detail.join("<br>");

  document.getElementById("total").innerText =
    "₩" + total.toLocaleString();

}

/* 이벤트 */
document.querySelectorAll("input, select").forEach(el=>{
  el.addEventListener("input", update);
});

/* 저장 */
function saveImage(){

  html2canvas(document.getElementById("capture")).then(canvas=>{

    let a = document.createElement("a");
    a.href = canvas.toDataURL();
    a.download = "quote.png";
    a.click();

  });

}

/* 카톡 */
function goKakao(){

  let text =
    document.getElementById("capture").innerText;

  window.open(
    "https://open.kakao.com/o/너링크?text=" +
    encodeURIComponent(text)
  );

}

</script>

</body>
</html>
