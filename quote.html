<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>견적 계산기</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Noto Sans KR', sans-serif;
  background:#050507;
  color:white;
}

/* 전체 */
.container{
  max-width:420px;
  margin:auto;
  padding:20px;
}

/* 제목 */
h1{
  font-family:'Bebas Neue';
  letter-spacing:5px;
  text-align:center;
}

/* 입력박스 */
.input-group{
  margin-top:20px;
}

.input-group label{
  display:block;
  margin-bottom:6px;
  font-size:14px;
  color:#aaa;
}

.input-group input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:none;
  background:#111;
  color:white;
  font-size:16px;
}

/* 버튼 */
button{
  width:100%;
  margin-top:20px;
  padding:16px;
  border:none;
  border-radius:30px;
  background:white;
  color:black;
  font-weight:bold;
  font-size:16px;
  transition:0.2s;
}

button:active{
  transform:scale(0.95);
}

/* 결과 */
.result{
  margin-top:30px;
  padding:20px;
  border-radius:12px;
  background:#0d0d12;
  border:1px solid #222;
}

.result h2{
  margin:0 0 10px;
}

.detail{
  font-size:14px;
  color:#aaa;
  margin-top:10px;
}

/* 카톡 버튼 */
.kakao-btn{
  display:block;
  text-align:center;
  margin-top:20px;
  padding:14px;
  border-radius:30px;
  background:#fee500;
  color:#000;
  font-weight:bold;
  text-decoration:none;
}

/* 🔥 모바일 최적화 */
@media (max-width:480px){

  h1{
    font-size:28px;
  }

  .input-group input{
    font-size:15px;
    padding:12px;
  }

  button{
    padding:14px;
    font-size:15px;
  }

  .result{
    padding:16px;
  }

}
</style>
</head>

<body>

<div class="container">

<h1>YOUR FILM</h1>

<!-- 입력 -->
<div class="input-group">
  <label>촬영 인원</label>
  <input type="number" id="people" placeholder="예: 3">
</div>

<div class="input-group">
  <label>음원 길이 (초)</label>
  <input type="number" id="time" placeholder="예: 90">
</div>

<div class="input-group">
  <label>촬영 시간 (시간)</label>
  <input type="number" id="shoot" placeholder="예: 2">
</div>

<div class="input-group">
  <label>총 수정 횟수 (기본 1회 포함)</label>
  <input type="number" id="edit" placeholder="예: 2">
</div>

<button onclick="calc()">견적 계산하기</button>

<!-- 결과 -->
<div class="result" id="result" style="display:none;">
  <h2 id="price"></h2>
  <div class="detail" id="detail"></div>

  <a href="https://open.kakao.com/o/너링크" class="kakao-btn">
    카톡으로 문의하기
  </a>
</div>

</div>

<script>
function calc(){

  let people = Number(document.getElementById("people").value);
  let time = Number(document.getElementById("time").value);
  let shoot = Number(document.getElementById("shoot").value);
  let edit = Number(document.getElementById("edit").value);

  let total = 0;
  let detail = "";

  /* 인원 */
  if(people > 1){
    if(people <=5){
      total += (people-1)*20000;
      detail += "촬영 인원 추가 +" + ((people-1)*2) + "만원\n";
    }else{
      total += (4*20000) + ((people-5)*50000);
      detail += "촬영 인원 추가 (5인 초과)\n";
    }
  }

  /* 음원 */
  if(time > 60){
    let extra = Math.ceil((time-60)/30);
    total += extra * 100000;
    detail += "음원 길이 초과 (" + extra*30 + "초)\n";
  }else{
    detail += "기본 1분 포함\n";
  }

  /* 촬영시간 */
  if(shoot > 1){
    total += (shoot-1)*50000;
    detail += "촬영 시간 추가\n";
  }

  /* 수정 */
  if(edit > 1){
    total += (edit-1)*30000;
    detail += "수정 추가\n";
  }else{
    detail += "수정 1회 포함\n";
  }

  /* 최소금액 */
  if(total < 100000){
    total = 100000;
  }

  document.getElementById("price").innerText =
    total.toLocaleString() + "원";

  document.getElementById("detail").innerText = detail;

  document.getElementById("result").style.display="block";
}
</script>

</body>
</html>
