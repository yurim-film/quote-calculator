<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>촬영 견적 계산</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{
  background:#0d0d0f;
  color:white;
  font-family:sans-serif;
  padding:20px;
  padding-bottom:120px;
}

.container{
  max-width:420px;
  margin:auto;
}

h2{
  text-align:center;
}

/* input */
input{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:#1a1a1d;
  color:white;
}

/* 🔥 기본 달력 아이콘 제거 */
input[type="date"]::-webkit-calendar-picker-indicator{
  opacity:0;
  position:absolute;
  right:0;
  width:100%;
  height:100%;
  cursor:pointer;
}

/* 📅 커스텀 달력 */
.date-wrap{
  position:relative;
}

.date-wrap input{
  padding-right:45px;
}

.calendar-icon{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  font-size:20px;
  z-index:2;
  cursor:pointer;
}

/* 시간 선택 */
.time-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}

.time-grid button{
  padding:14px;
  border-radius:12px;
  border:1px solid #333;
  background:#1a1a1d;
  color:#aaa;
  cursor:pointer;
}

.time-grid button.active{
  background:#7b61ff;
  color:white;
  transform:scale(1.05);
}

.time-grid button.disabled{
  opacity:0.3;
  pointer-events:none;
}

/* 옵션 */
.options{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}

.options button{
  flex:1;
  min-width:30%;
  padding:12px;
  border-radius:20px;
  border:none;
  background:#2a2a2e;
  color:white;
}

.options button.active{
  background:#7b61ff;
}

/* 결과 */
.result-card{
  background:#111;
  padding:20px;
  border-radius:16px;
  margin-top:20px;
  position:relative;
}

.total{
  font-size:30px;
  color:#7b61ff;
}

.watermark{
  position:absolute;
  bottom:10px;
  right:15px;
  font-size:12px;
  color:rgba(255,255,255,0.3);
}

/* 버튼 */
.save-btn{
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:12px;
  background:#7b61ff;
  color:white;
}

/* CTA */
.kakao-btn{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translate(-50%, 20px);
  width:90%;
  max-width:380px;
  padding:16px;
  border-radius:14px;
  background:#fee500;
  color:#000;
  text-align:center;
  font-weight:bold;
  opacity:0;
  transition:0.3s;
}

.kakao-btn.show{
  opacity:1;
  transform:translate(-50%, 0);
}
</style>
</head>

<body>

<div class="container">

<h2>촬영 견적 계산</h2>

<input type="text" id="client" placeholder="고객 이름">
<input type="text" id="phone" placeholder="연락처">

<!-- 📅 날짜 선택 -->
<div class="date-wrap">
  <input type="date" id="shoot_date">
  <span class="calendar-icon" onclick="openDate()">📆</span>
</div>

<p>촬영 시작 시간</p>
<div class="time-grid" id="timeGrid"></div>

<input type="number" id="duration" placeholder="촬영 소요 시간 (시간)">
<input type="number" id="people" placeholder="촬영 인원">

<div class="options">
  <button onclick="toggleOption('색보정',50000,this)">색보정</button>
  <button onclick="toggleOption('빠른납기',100000,this)">빠른 납기</button>
  <button onclick="toggleOption('야외촬영',50000,this)">야외 촬영</button>
</div>

<div class="result-card" id="capture">
  <h3>YOUR FILM</h3>
  <div id="detail"></div>
  <div class="total" id="total">₩0</div>
  <div class="watermark">YOUR FILM</div>
</div>

<button class="save-btn" onclick="saveImage()">이미지 저장</button>

</div>

<div class="kakao-btn" onclick="goKakao()">
🔥 지금 바로 견적 받고 상담하기
</div>

<script>

let selectedTime = "";
let options = {};

/* 📅 달력 열기 */
function openDate(){
  document.getElementById("shoot_date").showPicker();
}

/* 시간 생성 */
const times=["00:00","02:00","04:00","06:00","08:00","10:00","12:00","14:00","16:00","18:00","20:00","22:00"];
const grid=document.getElementById("timeGrid");

times.forEach(t=>{
  let btn=document.createElement("button");
  btn.innerText=t;
  btn.dataset.time=t;
  btn.onclick=()=>selectTime(t,btn);
  grid.appendChild(btn);
});

/* 시간 선택 */
function selectTime(time,el){
  if(el.classList.contains("disabled")) return;

  selectedTime=time;
  document.querySelectorAll(".time-grid button")
    .forEach(b=>b.classList.remove("active"));

  el.classList.add("active");
  update();
}

/* 옵션 */
function toggleOption(name,price,el){
  if(options[name]){
    delete options[name];
    el.classList.remove("active");
  }else{
    options[name]=price;
    el.classList.add("active");
  }
  update();
}

/* 계산 */
function update(){

  let detail=[];
  let total=0;

  let client=document.getElementById("client").value || "";
  let phone=document.getElementById("phone").value || "";

  if(client || phone){
    let info="";
    if(client) info+=`고객명: ${client} `;
    if(phone) info+=`(${phone})`;
    detail.push(`<strong>${info}</strong>`);
  }

  let duration=parseFloat(document.getElementById("duration").value)||0;
  let people=parseInt(document.getElementById("people").value)||0;

  if(duration>0){
    let cost=duration*50000;
    total+=cost;
    detail.push(`촬영 시간 = ₩${cost.toLocaleString()}`);
  }

  if(people>0){
    let cost=people*20000;
    total+=cost;
    detail.push(`인원 = ₩${cost.toLocaleString()}`);
  }

  for(let k in options){
    total+=options[k];
    detail.push(`${k} = ₩${options[k].toLocaleString()}`);
  }

  document.getElementById("detail").innerHTML=detail.map(d=>`<p>${d}</p>`).join("");
  document.getElementById("total").innerText="₩"+total.toLocaleString();
}

/* CTA */
window.addEventListener("scroll",()=>{
  let btn=document.querySelector(".kakao-btn");
  if(window.scrollY>200){
    btn.classList.add("show");
  }else{
    btn.classList.remove("show");
  }
});

/* 저장 */
function saveImage(){
  html2canvas(document.getElementById("capture"))
  .then(c=>{
    let a=document.createElement("a");
    a.href=c.toDataURL();
    a.download="quote.png";
    a.click();
  });
}

/* 카톡 */
function goKakao(){
  let text=document.getElementById("capture").innerText;
  window.open(`https://open.kakao.com/o/너링크?text=${encodeURIComponent(text)}`);
}

</script>

</body>
</html>
