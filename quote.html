<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>촬영 견적 계산</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body {
  background:#0d0d0f;
  color:white;
  font-family:sans-serif;
  padding:20px;
}

.container {
  max-width:420px;
  margin:auto;
}

h2 {
  text-align:center;
}

/* input */
input {
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:#1a1a1d;
  color:white;
}

/* 시간 UI */
.time-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}

.time-grid button{
  padding:14px;
  border-radius:12px;
  border:1px solid #333;
  background:#1a1a1d;
  color:#aaa;
  cursor:pointer;
  transition:0.2s;
}

.time-grid button.active{
  background:#7b61ff;
  color:white;
  transform:scale(1.05);
}

.time-grid button.disabled{
  background:#111;
  color:#444;
  pointer-events:none;
  opacity:0.4;
}

/* 옵션 */
.options button{
  margin-top:8px;
  width:100%;
  padding:12px;
  border-radius:20px;
  border:none;
  background:#2a2a2e;
  color:white;
}

.options button.active{
  background:#7b61ff;
}

/* 결과 */
.result-card{
  background:#111;
  padding:20px;
  border-radius:16px;
  margin-top:20px;
  position:relative;
}

.total{
  font-size:28px;
  color:#7b61ff;
}

/* 워터마크 */
.watermark{
  position:absolute;
  bottom:10px;
  right:15px;
  font-size:12px;
  color:rgba(255,255,255,0.3);
}

/* 버튼 */
.save-btn, .kakao-btn{
  width:100%;
  margin-top:10px;
  padding:14px;
  border:none;
  border-radius:12px;
}

.save-btn{
  background:#7b61ff;
  color:white;
}

.kakao-btn{
  background:#fee500;
  color:black;
  text-align:center;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>촬영 견적 계산</h2>

<!-- 고객 -->
<input type="text" id="client" placeholder="고객 이름">
<input type="text" id="phone" placeholder="연락처">

<!-- 날짜 -->
<input type="date" id="shoot_date">

<!-- 시간 선택 -->
<p>촬영 시작 시간</p>
<div class="time-grid" id="timeGrid"></div>

<!-- 소요시간 -->
<input type="number" id="duration" placeholder="촬영 소요 시간 (시간)">

<!-- 인원 -->
<input type="number" id="people" placeholder="촬영 인원">

<!-- 옵션 -->
<div class="options">
  <button onclick="toggleOption('color',80000,this)">색보정</button>
  <button onclick="toggleOption('fast',100000,this)">빠른 납기</button>
</div>

<!-- 결과 -->
<div class="result-card" id="capture">
  <h3>YOUR FILM</h3>
  <div id="detail"></div>
  <div class="total" id="total">₩0</div>
  <div class="watermark">YOUR FILM</div>
</div>

<button onclick="saveImage()" class="save-btn">이미지 저장</button>
<a onclick="goKakao()" class="kakao-btn">카톡 문의</a>

</div>

<script>

let selectedTime = "";
let options = {};

// 🔥 시간 생성
const times = ["00:00","02:00","04:00","06:00","08:00","10:00","12:00","14:00","16:00","18:00","20:00","22:00"];
const grid = document.getElementById("timeGrid");

times.forEach(t=>{
  let btn = document.createElement("button");
  btn.innerText = t;
  btn.dataset.time = t;
  btn.onclick = ()=>selectTime(t,btn);
  grid.appendChild(btn);
});

// 🔥 시간 선택
function selectTime(time, el){
  if(el.classList.contains("disabled")) return;

  selectedTime = time;

  document.querySelectorAll(".time-grid button")
    .forEach(b=>b.classList.remove("active"));

  el.classList.add("active");
  update();
}

// 🔥 날짜별 제한
function updateAvailableTimes(){
  let date = document.getElementById("shoot_date").value;
  if(!date) return;

  let day = new Date(date).getDay();

  document.querySelectorAll(".time-grid button").forEach(btn=>{
    let hour = parseInt(btn.dataset.time);

    btn.classList.remove("disabled");

    if(day === 4){ // 목요일
      btn.classList.add("disabled");
    }

    if(day >=1 && day <=3){
      if(hour >=9 && hour <23){
        btn.classList.add("disabled");
      }
    }
  });
}

document.getElementById("shoot_date")
  .addEventListener("change", updateAvailableTimes);

// 🔥 옵션
function toggleOption(name, price, el){
  if(options[name]){
    delete options[name];
    el.classList.remove("active");
  } else {
    options[name]=price;
    el.classList.add("active");
  }
  update();
}

// 🔥 계산
function update(){

  let detail=[];
  let total=0;

  let date = document.getElementById("shoot_date").value;
  let duration = parseFloat(document.getElementById("duration").value)||0;
  let people = parseInt(document.getElementById("people").value)||0;

  // 일정
  if(date || selectedTime){
    let text="";

    if(date){
      let d=new Date(date);
      text+=`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 `;
    }

    if(selectedTime && duration){
      let [h,m]=selectedTime.split(":");
      let endH = parseInt(h)+duration;
      text+=`${selectedTime} ~ ${endH}:00`;
    }else if(selectedTime){
      text+=selectedTime;
    }

    detail.push(`촬영 일정: ${text}`);
  }

  // 시간 비용
  if(duration>0){
    let cost=duration*50000;
    total+=cost;
    detail.push(`촬영 시간 (${duration}시간) = ₩${cost}`);
  }

  // 인원
  if(people>0){
    let cost=people*20000;
    total+=cost;
    detail.push(`촬영 인원 (${people}) = ₩${cost}`);
  }

  // 옵션
  for(let k in options){
    total+=options[k];
    detail.push(`${k} 옵션 = ₩${options[k]}`);
  }

  document.getElementById("detail").innerHTML = detail.join("<br>");
  document.getElementById("total").innerText = "₩"+total.toLocaleString();
}

// 🔥 이미지 저장
function saveImage(){
  html2canvas(document.getElementById("capture"))
  .then(c=>{
    let a=document.createElement("a");
    a.href=c.toDataURL();
    a.download="quote.png";
    a.click();
  });
}

// 🔥 카톡
function goKakao(){
  navigator.clipboard.writeText(
    document.getElementById("capture").innerText
  );
  alert("복사됨!");
  window.open("https://open.kakao.com/o/너링크");
}

</script>

</body>
</html>
