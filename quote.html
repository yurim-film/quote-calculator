<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>촬영 견적 계산</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body {
  background:#0d0d0f;
  color:white;
  font-family:sans-serif;
  padding:20px;
}

.container {
  max-width:420px;
  margin:auto;
}

h2 {
  text-align:center;
  margin-bottom:20px;
}

.section {
  margin-top:20px;
}

input {
  width:100%;
  padding:16px;
  box-sizing:border-box;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:15px;
  background:#1a1a1d;
  color:white;
  line-height:1.4;
}

.flex {
  display:flex;
  gap:10px;
}
  
.flex input {
  width:50%;
}
  
.options {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}

button {
  padding:10px 14px;
  border:none;
  border-radius:20px;
  background:#2a2a2e;
  color:white;
  cursor:pointer;
}

button.active {
  background:#7b61ff;
}

.result-card {
  background:#111;
  border:1px solid #333;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
  padding:20px;
  border-radius:16px;
  margin-top:30px;
}

.result-title {
  font-size:14px;
  color:#aaa;
}

.total {
  font-size:32px;
  color:#7b61ff;
  margin-top:5px;
}

#detail {
  margin-top:10px;
  font-size:13px;
  color:#aaa;
}

.save-btn {
  width:100%;
  background:#7b61ff;
  color:white;
  padding:14px;
  border:none;
  border-radius:12px;
  margin-top:15px;
  font-size:16px;
}

.kakao-btn {
  display:block;
  text-align:center;
  background:#fee500;
  color:#000;
  padding:16px;
  border-radius:12px;
  margin-top:20px;
  text-decoration:none;
  font-weight:bold;
}

  #capture p {
  line-height:1.5;
}

  
</style>
</head>

<body>

<div class="container">

<h2>촬영 견적 계산</h2>

<div class="section">
  <p>촬영 정보</p>

  <input type="number" id="people" placeholder="촬영 인원 (5명 미만 2 // 초과시 인당 3)">

  <div class="flex">
    <input type="number" id="music_min" placeholder="분 (기본 1분)">
    <input type="number" id="music_sec" placeholder="초 (초과시 30초당 10)">
  </div>

  <input type="number" id="time" placeholder="촬영 시간 (시간당 5)">
  <input type="number" id="edit" placeholder="수정 횟수 (무료 1회 포함)">
</div>

<div class="section">
  <p>옵션 선택</p>
  <div class="options">
    <button onclick="toggleOption('color',80000,this)">옵션1</button>
    <button onclick="toggleOption('fast',100000,this)">옵션2</button>
    <button onclick="toggleOption('outdoor',70000,this)">야외 촬영</button>
  </div>
</div>

<div class="result-card" id="capture">
  <h3>YU RIM STUDIO</h3>
  <p class="result-title">촬영 견적서</p>

  <div class="total" id="total">₩100,000</div>
  <div id="detail"></div>

  <hr style="margin:15px 0; border:0.5px solid #333;">

  <p id="date" style="font-size:12px; color:#888;"></p>
</div>

<button onclick="saveImage()" class="save-btn">
  견적 이미지 저장
</button>

<a class="kakao-btn" href="https://open.kakao.com/o/너링크" target="_blank">
  카톡으로 문의하기
</a>

</div>

<script>
let options = {};

function toggleOption(name, price, el){
  if(options[name]){
    delete options[name];
    el.classList.remove("active");
  } else {
    options[name] = price;
    el.classList.add("active");
  }
  update();
}

function update(){
  let people = parseInt(document.getElementById("people").value) || 0;
  let min = parseInt(document.getElementById("music_min").value) || 0;
  let sec = parseInt(document.getElementById("music_sec").value) || 0;
  let time = parseInt(document.getElementById("time").value) || 0;
  let edit = parseInt(document.getElementById("edit").value) || 0;

  let total = 0;
  let detail = [];

  // 👥 인원
  if(people > 0){
    let cost = (people > 5) ? people * 30000 : people * 20000;
    total += cost;
    detail.push(`촬영 인원 (${people}명) = ₩${cost.toLocaleString()}`);
  }

  // 🎵 음원
  let totalSec = (min * 60) + sec;

  if(totalSec > 0){
    detail.push(`음원 길이: ${min}분 ${sec}초`);
  }

  if(totalSec > 60){
    let extra = Math.ceil((totalSec - 60) / 30);
    let cost = extra * 100000;
    total += cost;
    detail.push(`음원 추가 (${extra} × 100,000) = ₩${cost.toLocaleString()}`);
  }

  // ⏱️ 시간
  if(time > 0){
    let cost = time * 50000;
    total += cost;
    detail.push(`촬영 시간 (${time}시간) = ₩${cost.toLocaleString()}`);
  }

  // 🔁 수정
  if(edit > 1){
    let cost = (edit - 1) * 35000;
    total += cost;
    detail.push(`1회 제외한 추가 수정 횟수 (${edit - 1}회) = ₩${cost.toLocaleString()}`);
  }

  // ⚙️ 옵션
  if(Object.keys(options).length > 0){
    for(let key in options){
      total += options[key];

      let name = "";
      if(key === "color") name = "옵션1";
      if(key === "fast") name = "옵션2";
      if(key === "outdoor") name = "야외 촬영";

      detail.push(`옵션 - ${name} = ₩${options[key].toLocaleString()}`);
    }
  }

  // 💰 최소 금액
  if(total < 100000){
    total = 100000;
    detail.push(`최소 금액 적용 = ₩100,000`);
  }

  document.getElementById("total").innerText =
    "₩" + total.toLocaleString();

  document.getElementById("detail").innerHTML =
    detail.map(d => `<p>${d}</p>`).join("");

  // 날짜
  document.getElementById("date").innerText =
    new Date().toLocaleDateString();
}

document.querySelectorAll("input").forEach(i=>{
  i.addEventListener("input", update);
});

function saveImage(){
  const target = document.getElementById("capture");

  html2canvas(target, {
  backgroundColor:"#111",
  scale:2,
  useCORS:true,
  scrollY: -window.scrollY
})
  
  }).then(canvas=>{
    let link = document.createElement("a");
    link.download = "quote.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}
</script>

</body>
</html>
