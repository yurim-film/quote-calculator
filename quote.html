<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>촬영 견적 계산</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body {
  background:#0d0d0f;
  color:white;
  font-family:sans-serif;
  padding:20px;
}

.container {
  max-width:420px;
  margin:auto;
}

h2 {
  text-align:center;
  margin-bottom:20px;
}

.section {
  margin-top:20px;
}

input {
  width:100%;
  padding:16px;
  border:none;
  border-radius:10px;
  font-size:15px;
  background:#1a1a1d;
  color:white;
  box-sizing:border-box;
  margin-top:10px;
}

.flex {
  display:flex;
  gap:10px;
}

.flex input {
  width:50%;
}

.options {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}

/* 🔥 옵션 버튼 업그레이드 */
.options button{
  flex:1;
  min-width:30%;
  padding:12px;
  border-radius:20px;
  background:#2a2a2e;
  color:white;
  border:none;
  cursor:pointer;
  transition:0.25s;
}

button.active {
  background:#7b61ff;
  transform:scale(1.05);
  box-shadow:0 0 10px rgba(123,97,255,0.6);
  animation:pop 0.2s ease;
}

.options button:active{
  transform:scale(0.92);
}

@keyframes pop{
  0%{ transform:scale(0.9); }
  100%{ transform:scale(1.05); }
}

/* 결과 카드 */
.result-card {
  background:#111;
  border:1px solid #333;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
  padding:20px;
  border-radius:16px;
  margin-top:30px;
  position:relative;
}

.result-title {
  font-size:14px;
  color:#aaa;
}

.total {
  font-size:32px;
  color:#7b61ff;
  margin-top:5px;
}

#detail {
  margin-top:10px;
  font-size:13px;
  color:#aaa;
}

#capture p {
  line-height:1.5;
}

/* 🔥 워터마크 */
.watermark{
  position:absolute;
  bottom:10px;
  right:15px;
  font-size:12px;
  color:rgba(255,255,255,0.3);
  letter-spacing:2px;
}

.save-btn {
  width:100%;
  background:#7b61ff;
  color:white;
  padding:14px;
  border:none;
  border-radius:12px;
  margin-top:15px;
  font-size:16px;
}

.save-btn:active{
  transform:scale(0.95);
}

.kakao-btn {
  display:block;
  text-align:center;
  background:#fee500;
  color:#000;
  padding:16px;
  border-radius:12px;
  margin-top:20px;
  text-decoration:none;
  font-weight:bold;
}

/* 🔥 모바일 */
@media (max-width:480px){

  body{ padding:15px; }

  h2{ font-size:20px; }

  input{
    padding:14px;
    font-size:14px;
  }

  .flex{
    gap:8px;
  }

  .options{
    gap:6px;
  }

  .options button{
    padding:14px;
    font-size:13px;
  }

  .result-card{
    padding:18px;
  }

  .total{ font-size:26px; }

  #detail{
    font-size:12px;
    line-height:1.6;
  }

  /* 카톡 버튼 고정 */
  .kakao-btn{
    position:fixed;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    max-width:380px;
    z-index:999;
  }
}
</style>
</head>

<body>

<div class="container">

<h2>촬영 견적 계산</h2>

<div class="section">
  <p>촬영 정보</p>

  <input type="text" id="client" placeholder="고객 이름">
  <input type="text" id="phone" placeholder="연락처">
  <input type="text" id="insta" placeholder="인스타그램 ID">

  <input type="number" id="people" placeholder="촬영 인원 (명)">

  <div class="flex">
    <input type="number" id="music_min" placeholder="분">
    <input type="number" id="music_sec" placeholder="초">
  </div>

  <input type="number" id="time" placeholder="촬영 시간 (시간)">
  <input type="number" id="edit" placeholder="총 수정 횟수 (기본 1회 포함)">
</div>

<div class="section">
  <p>옵션 선택</p>
  <div class="options">
    <button onclick="toggleOption('color',80000,this)">색보정</button>
    <button onclick="toggleOption('fast',100000,this)">빠른 납기</button>
    <button onclick="toggleOption('outdoor',70000,this)">야외 촬영</button>
  </div>
</div>

<div class="result-card" id="capture">
  <h3>YOUR FILM</h3>

  <div id="clientInfo" style="font-size:13px; margin-bottom:10px;"></div>

  <p class="result-title">촬영 견적서</p>

  <div class="total" id="total">₩100,000</div>
  <div id="detail"></div>

  <hr style="margin:15px 0; border:0.5px solid #333;">
  <p id="date" style="font-size:12px; color:#888;"></p>

  <!-- 🔥 워터마크 -->
  <div class="watermark">YOUR FILM</div>
</div>

<button onclick="saveImage()" class="save-btn">
  견적 이미지 저장
</button>

<a class="kakao-btn" href="#" onclick="goKakao()">
  카톡으로 문의하기
</a>

</div>

<script>
let options = {};

function toggleOption(name, price, el){
  if(options[name]){
    delete options[name];
    el.classList.remove("active");
  } else {
    options[name] = price;
    el.classList.add("active");
  }
  update();
}

function update(){
  let client = clientEl.value || "";
  let phone = phoneEl.value || "";
  let insta = instaEl.value || "";

  let people = parseInt(peopleEl.value)||0;
  let min = parseInt(minEl.value)||0;
  let sec = parseInt(secEl.value)||0;
  let time = parseInt(timeEl.value)||0;
  let edit = parseInt(editEl.value)||0;

  let total = 0;
  let detail = [];

  let infoText="";
  if(client) infoText+=`고객: ${client}<br>`;
  if(phone) infoText+=`연락처: ${phone}<br>`;
  if(insta) infoText+=`인스타: ${insta}`;
  clientInfo.innerHTML=infoText;

  if(people>0){
    let cost=(people>5)?people*50000:people*20000;
    total+=cost;
    detail.push(`촬영 인원 (${people}명) = ₩${cost.toLocaleString()}`);
  }

  let totalSec=min*60+sec;

  if(totalSec>0){
    let text=`음원 길이: ${min}분 ${sec}초`;
    if(totalSec>60) text+=" (기본 1분 포함)";
    detail.push(text);
  }

  if(totalSec>60){
    let extra=Math.ceil((totalSec-60)/30);
    let cost=extra*100000;
    total+=cost;
    detail.push(`음원 추가 (${extra*30}초) = ₩${cost.toLocaleString()}`);
  }

  if(time>0){
    let cost=time*50000;
    total+=cost;
    detail.push(`촬영 시간 (${time}시간) = ₩${cost.toLocaleString()}`);
  }

  if(edit>0){
    detail.push(`총 수정 횟수: ${edit}회 (기본 1회 포함)`);
  }

  if(edit>1){
    let cost=(edit-1)*30000;
    total+=cost;
    detail.push(`추가 수정 (${edit-1}회) = ₩${cost.toLocaleString()}`);
  }

  for(let key in options){
    total+=options[key];
    let name = key==="color"?"색보정":key==="fast"?"빠른 납기":"야외 촬영";
    detail.push(`옵션 - ${name} = ₩${options[key].toLocaleString()}`);
  }

  if(total<100000){
    total=100000;
    detail.push(`최소 금액 적용 = ₩100,000`);
  }

  totalEl.innerText="₩"+total.toLocaleString();
  detailEl.innerHTML=detail.map(d=>`<p>${d}</p>`).join("");
  dateEl.innerText=new Date().toLocaleDateString();
}

const clientEl=client, phoneEl=phone, instaEl=insta,
peopleEl=people, minEl=music_min, secEl=music_sec,
timeEl=time, editEl=edit,
totalEl=total, detailEl=detail, dateEl=date;

document.querySelectorAll("input").forEach(i=>i.addEventListener("input",update));

function saveImage(){
  html2canvas(capture,{
    backgroundColor:"#111",
    scale:2
  }).then(c=>{
    let link=document.createElement("a");
    link.download="quote.png";
    link.href=c.toDataURL();
    link.click();
  });
}

function goKakao(){
  navigator.clipboard.writeText(capture.innerText).then(()=>{
    alert("견적이 복사되었습니다!\n카톡에 붙여넣기 해주세요 😊");
    window.open("https://open.kakao.com/o/너링크");
  });
}
</script>

</body>
</html>
