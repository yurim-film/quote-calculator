<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>촬영 견적 계산</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background:#0d0d0f;
  color:white;
  font-family:sans-serif;
  padding:20px;
}

.container {
  max-width:420px;
  margin:auto;
}

h2 {
  text-align:center;
  margin-bottom:20px;
}

.section {
  margin-top:20px;
}

input {
  width:100%;
  padding:16px;
  border:none;
  border-radius:10px;
  font-size:15px;
  background:#1a1a1d;
  color:white;
  box-sizing:border-box;
  line-height:1.4;
  margin-top:10px;
}

.flex {
  display:flex;
  gap:10px;
}

.flex input {
  width:50%;
}

.options {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:20px;
  background:#2a2a2e;
  color:white;
  cursor:pointer;
}

button.active {
  background:#7b61ff;
}

.result-card {
  background:#111;
  border:1px solid #333;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
  padding:20px;
  border-radius:16px;
  margin-top:30px;
  overflow:visible;
}

.result-title {
  font-size:14px;
  color:#aaa;
}

.total {
  font-size:32px;
  color:#7b61ff;
  margin-top:5px;
}

#detail {
  margin-top:10px;
  font-size:13px;
  color:#aaa;
}

#capture p {
  line-height:1.5;
}

.save-btn {
  width:100%;
  background:#7b61ff;
  color:white;
  padding:14px;
  border:none;
  border-radius:12px;
  margin-top:15px;
  font-size:16px;
}

.kakao-btn {
  display:block;
  text-align:center;
  background:#fee500;
  color:#000;
  padding:16px;
  border-radius:12px;
  margin-top:20px;
  text-decoration:none;
  font-weight:bold;
}
  /* 🔥 모바일 최적화 */
@media (max-width:480px){

  body{
    padding:15px;
  }

  .container{
    padding:0;
  }

  h2{
    font-size:20px;
  }

  /* 입력 */
  input{
    padding:14px;
    font-size:14px;
  }

  .flex{
    gap:8px;
  }

  /* 옵션 버튼 */
  .options{
    gap:6px;
  }

  .options button{
    flex:1;
    min-width:30%;
    padding:14px;
    font-size:13px;
  }

  /* 결과 카드 */
  .result-card{
    padding:18px;
    border-radius:14px;
  }

  .total{
    font-size:26px;
  }

  #detail{
    font-size:12px;
    line-height:1.6;
  }

  /* 저장 버튼 */
  .save-btn{
    padding:16px;
    font-size:15px;
  }

  /* 카톡 버튼 (핵심🔥) */
  .kakao-btn{
    position:fixed;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    max-width:380px;
    font-size:16px;
    padding:18px;
    z-index:999;
  }

}
</style>
</head>

<body>

<div class="container">

<h2>촬영 견적 계산</h2>

<div class="section">
  <p>촬영 정보</p>

  <input type="text" id="client" placeholder="고객 이름">
  <input type="text" id="phone" placeholder="연락처">
  <input type="text" id="insta" placeholder="인스타그램 ID">

  <input type="number" id="people" placeholder="촬영 인원 (명)">

  <div class="flex">
    <input type="number" id="music_min" placeholder="분">
    <input type="number" id="music_sec" placeholder="초">
  </div>

  <input type="number" id="time" placeholder="촬영 시간 (시간)">
  <input type="number" id="edit" placeholder="총 수정 횟수 (기본 1회 포함)">
</div>

<div class="section">
  <p>옵션 선택</p>
  <div class="options">
    <button onclick="toggleOption('color',80000,this)">색보정</button>
    <button onclick="toggleOption('fast',100000,this)">빠른 납기</button>
    <button onclick="toggleOption('outdoor',70000,this)">야외 촬영</button>
  </div>
</div>

<div class="result-card" id="capture">
  <h3>YOUR FILM</h3>

  <div id="clientInfo" style="font-size:13px; margin-bottom:10px;"></div>

  <p class="result-title">촬영 견적서</p>

  <div class="total" id="total">₩100,000</div>
  <div id="detail"></div>

  <hr style="margin:15px 0; border:0.5px solid #333;">
  <p id="date" style="font-size:12px; color:#888;"></p>
</div>

<button onclick="saveImage()" class="save-btn">
  견적 이미지 저장
</button>

<a class="kakao-btn" href="#" onclick="goKakao()">
  카톡으로 문의하기
</a>

</div>

<script>
let options = {};

function toggleOption(name, price, el){
  if(options[name]){
    delete options[name];
    el.classList.remove("active");
  } else {
    options[name] = price;
    el.classList.add("active");
  }
  update();
}

function update(){
  let client = document.getElementById("client").value || "";
  let phone = document.getElementById("phone").value || "";
  let insta = document.getElementById("insta").value || "";

  let people = parseInt(document.getElementById("people").value) || 0;
  let min = parseInt(document.getElementById("music_min").value) || 0;
  let sec = parseInt(document.getElementById("music_sec").value) || 0;
  let time = parseInt(document.getElementById("time").value) || 0;
  let edit = parseInt(document.getElementById("edit").value) || 0;

  let total = 0;
  let detail = [];

  // 고객 정보
  let infoText = "";
  if(client) infoText += `고객: ${client}<br>`;
  if(phone) infoText += `연락처: ${phone}<br>`;
  if(insta) infoText += `인스타: ${insta}`;
  document.getElementById("clientInfo").innerHTML = infoText;

  // 인원
  if(people > 0){
    let cost = (people > 5) ? people * 50000 : people * 20000;
    total += cost;
    detail.push(`촬영 인원 (${people}명) = ₩${cost.toLocaleString()}`);
  }

  // 음원
  let totalSec = (min * 60) + sec;

  if(totalSec > 0){
    let text = `음원 길이: ${min}분 ${sec}초`;
    if(totalSec > 60){
      text += " (기본 1분 포함. 초과시 30초단위 계산)";
    }
    detail.push(text);
  }

  if(totalSec > 60){
    let extraSec = totalSec - 60;
    let extraUnit = Math.ceil(extraSec / 30);
    let cost = extraUnit * 100000;
    total += cost;

    let displaySec = extraUnit * 30;
    let displayMin = Math.floor(displaySec / 60);
    let remainSec = displaySec % 60;

    let timeText = "";
    if(displayMin > 0) timeText += `${displayMin}분 `;
    if(remainSec > 0) timeText += `${remainSec}초 `;
    timeText += "초과";

    detail.push(`음원 추가 (${timeText}) = ₩${cost.toLocaleString()}`);
  }

  // 촬영 시간
  if(time > 0){
    let cost = time * 50000;
    total += cost;
    detail.push(`촬영 시간 (${time}시간) = ₩${cost.toLocaleString()}`);
  }

  // 수정
  if(edit > 0){
    let text = `총 수정 횟수: ${edit}회`;
    if(edit > 1){
      text += " (기본 1회 포함)";
    }
    detail.push(text);
  }

  if(edit > 1){
    let cost = (edit - 1) * 30000;
    total += cost;
    detail.push(`추가 수정 (${edit - 1}회) = ₩${cost.toLocaleString()}`);
  }

  // 옵션
  for(let key in options){
    total += options[key];

    let name = "";
    if(key === "color") name = "색보정";
    if(key === "fast") name = "빠른 납기";
    if(key === "outdoor") name = "야외 촬영";

    detail.push(`옵션 - ${name} = ₩${options[key].toLocaleString()}`);
  }

  // 최소금액
  if(total < 100000){
    total = 100000;
    detail.push(`최소 금액 적용 = ₩100,000`);
  }

  document.getElementById("total").innerText =
    "₩" + total.toLocaleString();

  document.getElementById("detail").innerHTML =
    detail.map(d => `<p>${d}</p>`).join("");

  document.getElementById("date").innerText =
    new Date().toLocaleDateString();
}

document.querySelectorAll("input").forEach(i=>{
  i.addEventListener("input", update);
});

function saveImage(){
  const target = document.getElementById("capture");

  html2canvas(target, {
    backgroundColor:"#111",
    scale:2,
    useCORS:true,
    scrollY:-window.scrollY
  }).then(canvas=>{
    let link = document.createElement("a");
    link.download = "quote.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

function goKakao(){
  let text = document.getElementById("capture").innerText;

  navigator.clipboard.writeText(text);

  alert("견적이 복사되었습니다!\n카톡에 붙여넣기 해주세요 😊");

  window.open("https://open.kakao.com/o/너링크");
}
</script>

</body>
</html>
