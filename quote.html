<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>촬영 견적 계산</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body {
  background:#0d0d0f;
  color:white;
  font-family:sans-serif;
  padding:20px;
}

input {
  width:100%;
  padding:18px;
  margin:10px 0;
  border:none;
  border-radius:12px;
  font-size:16px;
}

button {
  padding:12px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#2a2a2e;
  color:white;
  cursor:pointer;
}

button.active {
  background:#7b61ff;
}

.kakao-btn {
  display:block;
  text-align:center;
  background:#fee500;
  color:#000;
  padding:16px;
  border-radius:12px;
  margin-top:20px;
  text-decoration:none;
  font-weight:bold;
}
  
.card {
  background:#1a1a1d;
  padding:20px;
  border-radius:16px;
  margin-top:20px;
}

.total {
  font-size:28px;
  color:#7b61ff;
}
</style>
</head>

<body>

<h2>촬영 견적 계산</h2>

<input type="number" id="time" placeholder="촬영 시간 (시간)">
<input type="number" id="distance" placeholder="이동 거리 (km)">
<input type="number" id="edit" placeholder="수정 횟수">

<div>
  <button onclick="toggleOption('color',80000,this)">색보정</button>
  <button onclick="toggleOption('fast',100000,this)">빠른 납기</button>
  <button onclick="toggleOption('outdoor',70000,this)">야외 촬영</button>
</div>

<div class="card">
  <p>총 금액</p>
  <h1 class="total" id="total">₩100,000</h1>
</div>

<button onclick="saveImage()">견적 이미지 저장</button>

<script>
let base = 100000;
let options = {};

function toggleOption(name, price, el){
  if(options[name]){
    delete options[name];
    el.classList.remove("active");
  } else {
    options[name] = price;
    el.classList.add("active");
  }
  update();
}

function update(){
  let time = document.getElementById("time").value || 0;
  let distance = document.getElementById("distance").value || 0;
  let edit = document.getElementById("edit").value || 0;

  let total = base;
  total += time * 30000;
  total += distance * 2000;
  total += edit * 20000;

  for(let key in options){
    total += options[key];
  }

  document.getElementById("total").innerText =
    "₩" + total.toLocaleString();
}

document.querySelectorAll("input").forEach(i=>{
  i.addEventListener("input", update);
});

function saveImage(){
  html2canvas(document.body).then(canvas=>{
    let link = document.createElement("a");
    link.download = "quote.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}
</script>

</body>
</html>
