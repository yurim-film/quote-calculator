<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>촬영 견적 계산</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body {
  background:#0d0d0f;
  color:white;
  font-family: 'Arial', sans-serif;
  padding:20px;
}

.container {
  max-width:420px;
  margin:auto;
}

h2 {
  text-align:center;
  margin-bottom:20px;
}

.section {
  margin-top:20px;
}

input {
  width:100%;
  padding:16px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:15px;
  background:#1a1a1d;
  color:white;
}

.options {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}

button {
  padding:10px 14px;
  border:none;
  border-radius:20px;
  background:#2a2a2e;
  color:white;
  cursor:pointer;
}

button.active {
  background:#7b61ff;
}

.result-card {
  background:#1a1a1d;
  padding:20px;
  border-radius:16px;
  margin-top:30px;
}

.result-title {
  font-size:14px;
  color:#aaa;
}

.total {
  font-size:32px;
  color:#7b61ff;
  margin-top:5px;
}

.kakao-btn {
  display:block;
  text-align:center;
  background:#fee500;
  color:#000;
  padding:16px;
  border-radius:12px;
  margin-top:20px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>
<div class="container">

<h2>촬영 견적 계산</h2>

<div class="section">
  <p>촬영 정보</p>
  <input type="number" id="time" placeholder="촬영 시간 (시간)">
  <input type="number" id="distance" placeholder="이동 거리 (km)">
  <input type="number" id="edit" placeholder="수정 횟수">
</div>

<div class="section">
  <p>옵션 선택</p>
  <div class="options">
    <button onclick="toggleOption('color',80000,this)">색보정</button>
    <button onclick="toggleOption('fast',100000,this)">빠른 납기</button>
    <button onclick="toggleOption('outdoor',70000,this)">야외 촬영</button>
  </div>
</div>

<div class="result-card">
  <p class="result-title">총 견적 금액</p>
  <div class="total" id="total">₩100,000</div>
</div>

<a class="kakao-btn" href="https://open.kakao.com/o/너링크" target="_blank">
  카톡으로 문의하기
</a>

</div>

</body>
</html>
